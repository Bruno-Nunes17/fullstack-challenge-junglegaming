name: CI - Fullstack Challenge

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      
      - name: Install dependencies
        run: bun install
        working-directory: frontend
        
      - name: Lint
        run: bun run lint
        working-directory: frontend
        
      - name: Type Check
        run: bun x tsc --noEmit
        working-directory: frontend

  validate-games-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      
      - name: Install dependencies
        run: bun install
        
      - name: Run Tests
        run: bun test
        working-directory: services/games

  validate-wallets-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      
      - name: Install dependencies
        run: bun install
        
      - name: Run Tests
        run: bun test
        working-directory: services/wallets
